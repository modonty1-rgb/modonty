      - generic [ref=e162]:
        - heading "What is “website authority”?" [level=2] [ref=e168]
        - paragraph [ref=e174]: “Website authority” is an SEO concept that refers to the “strength” of a given domain.
        - paragraph [ref=e180]: Some people call this “domain authority,” which is not to be confused with the Domain Authority (DA) metric from Moz. When we talk about domain authority, we’re talking about a general SEO concept that’s synonymous with “website authority.”
        - paragraph [ref=e186]: Here at Ahrefs, we have a website authority metric of our own called Domain Rating. It runs on a scale from zero to a hundred. The higher a website’s Domain Rating (DR), the stronger and more authoritative it is.
        - paragraph [ref=e192]: The free tool above shows your website’s “authority” as calculated by Ahrefs (i.e., Domain Rating).
      - separator [ref=e193]
      - generic [ref=e198]:
        - heading "How we calculate our Domain Rating (DR) score" [level=2] [ref=e204]
        - paragraph [ref=e210]: Domain Rating (DR) looks at the quantity and quality of external backlinks to a website.
        - paragraph [ref=e216]: "Here’s how we calculate this metric in simple terms:"
        - list [ref=e224]:
          - listitem [ref=e225]:
            - paragraph [ref=e226]: Look at how many unique domains link to the target website;
          - listitem [ref=e227]:
            - paragraph [ref=e228]: Look at the "authority" of those linking domains;
          - listitem [ref=e229]:
            - paragraph [ref=e230]: Take into account how many unique domains each of those sites link to;
          - listitem [ref=e231]:
            - paragraph [ref=e232]: Apply some math and coding magic to calculate “raw” DR scores;
          - listitem [ref=e233]:
            - paragraph [ref=e234]: Plot these scores on a 100-point scale
        - paragraph [ref=e240]: Domain Rating doesn’t take into account any other variables like link spam, traffic, domain age, etc.
        - paragraph [ref=e246]:
          - text: Learn more about Domain Rating
          - link "here" [ref=e247] [cursor=pointer]:
            - /url: https://ahrefs.com/blog/domain-rating/
          - text: .
      - separator [ref=e248]
      - generic [ref=e253]:
        - heading "Why the “authority” of your domain matters" [level=2] [ref=e259]
        - paragraph [ref=e265]: Google representatives consistently deny the use of "domain authority" as a ranking factor. But according to Google’s John Mueller, they do have a sitewide score that "maps to similar things."
        - paragraph [ref=e271]: Plus, when we studied the correlation between Domain Rating (DR) and keyword rankings for 218,713 domains, we found that the two correlate well.
        - img [ref=e279]
        - paragraph [ref=e285]: This makes Domain Rating (authority) a useful metric by which to estimate a website’s ability to get organic traffic from Google.
        - paragraph [ref=e291]: "Disclaimer: This is a correlation study. It does not prove causation."
      - separator [ref=e292]
      - generic [ref=e297]:
        - heading "What is a good Domain Rating (authority) score?" [level=2] [ref=e303]
        - paragraph [ref=e309]: Generally speaking, the higher the "authority" of your domain, the better.
        - paragraph [ref=e315]: But it’s important not to judge Domain Rating in absolute terms. That’s because Domain Rating is a relative metric by definition. It’s not possible to say that a Domain Rating of 30 is good, or 50, or 60, or 70. It’s all relative.
        - paragraph [ref=e321]: "Here’s a general rule of thumb:"
        - paragraph [ref=e327]: Your Domain Rating (authority) is good if it’s higher than or comparable to similar sites.
      - separator [ref=e328]
      - generic [ref=e333]:
        - heading "How to improve your Domain Rating (i.e., \"authority\" score)" [level=2] [ref=e339]
        - paragraph [ref=e345]: Getting backlinks from more unique websites (referring domains) is the only way to improve your website’s Domain Rating (authority) score.
        - paragraph [ref=e351]: But improving your site’s "authority" should never be your primary goal.
        - paragraph [ref=e357]: You should instead focus on earning backlinks from strong pages on reputable sites in your industry to the pages that you want to rank in Google. That’s because there’s a clear correlation between the number of referring domains to a page and the amount of organic traffic it gets.
        - generic [ref=e363]:
          - img [ref=e365]
          - generic [ref=e367]: The correlation between referring domains and search traffic (~920 million pages studied).
        - paragraph [ref=e373]: Furthermore, we found that the number of referring domains to a page is the strongest correlating backlink factor as far as rankings are concerned.
        - img [ref=e381]
      - separator [ref=e382]
      - generic [ref=e387]:
        - heading "How to use “website authority”" [level=2] [ref=e393]
        - paragraph [ref=e399]: "Here are two good uses cases:"
        - heading "1. Benchmarking against your competitors" [level=3] [ref=e405]
        - paragraph [ref=e411]: If your website "authority" is higher than that of your competitors, then your site is stronger than theirs in terms of "link popularity."
        - paragraph [ref=e417]: For example, ahrefs.com has a Domain Rating of 88. Moz.com has a Domain Rating of 91.
        - paragraph [ref=e423]: That’s because it has more backlinks from websites with strong link profiles, which leads to a higher "authority" score (as measured by Ahrefs).
        - paragraph [ref=e429]: TIP. If two websites have the same Domain Rating, then you should use Ahrefs Rank (AR) to judge their relative strength.
        - paragraph [ref=e435]: Comparing your Domain Rating to other websites in your industry can tell you whether your competitors are doing better or worse than you. If they’re doing better, then you may want to analyze their backlink profile in Ahrefs Site Explorer for untapped link opportunities.
        - heading "2. Vetting link prospects" [level=3] [ref=e441]
        - paragraph [ref=e447]: Google cares more about the "strength" of the linking page than that of the linking domain. Still, pages on high "authority" domains tend to be stronger than those on low "authority" sites.
        - paragraph [ref=e453]: For that reason, Ahrefs’ Domain Rating is a good proxy by which to judge the relative quality of link prospects.
        - paragraph [ref=e459]: Still, never judge the quality of a website on site-wide "authority" alone.
        - paragraph [ref=e465]: "You should also consider the following:"
        - list [ref=e473]:
          - listitem [ref=e474]:
            - text: •
            - paragraph [ref=e475]: Do they have high-quality backlinks?
          - listitem [ref=e476]:
            - text: •
            - paragraph [ref=e477]: Do they have lots of pages? (fewer is usually better)
          - listitem [ref=e478]:
            - text: •
            - paragraph [ref=e479]: Do they link out to a lot of websites? (again, fewer tends to be better)
          - listitem [ref=e480]:
            - text: •
            - paragraph [ref=e481]: Are they publishing high-quality content?
          - listitem [ref=e482]:
            - text: •
            - paragraph [ref=e483]: Is this website likely to still be around in six months? A year? Five years?
          - listitem [ref=e484]:
            - text: •
            - paragraph [ref=e485]: Does it get any organic traffic? Is this website topically-relevant to yours?
