                                - heading [level=2]: الفرصة الذهبية في التعليم الرقمي
                                - paragraph:
                                  - text: سوق التعليم الإلكتروني في الشرق الأوسط يصل إلى
                                  - strong: 1.2 مليار دولار
                                  - text: بحلول 2026. المملكة العربية السعودية تقود هذا التحول بمبادرات طموحة ضمن رؤية 2030.
                                - paragraph: التعليم الرقمي لم يعد بديلاً مؤقتاً، بل أصبح ركيزة أساسية في المنظومة التعليمية. منصة مدرستي خدمت أكثر من 6 ملايين طالب خلال جائحة كورونا.
                                - heading [level=2]: المنصات السعودية الرائدة
                                - heading [level=3]: منصة مدرستي
                                - paragraph: المنصة الحكومية الأكبر في المنطقة، تقدم محتوى تعليمي تفاعلي لجميع المراحل الدراسية مع أدوات تقييم ذكية ومتابعة أولياء الأمور.
                                - heading [level=3]: منصات القطاع الخاص
                                - paragraph: شركات مثل نون أكاديمي وإثراء تقدم دورات متخصصة في البرمجة والتصميم وريادة الأعمال، مستهدفة الشباب السعودي الطموح.
                                - heading [level=2]: التقنيات المستخدمة
                                - paragraph: الواقع الافتراضي (VR) يُستخدم في تدريس العلوم والتاريخ، مما يتيح للطلاب زيارة المواقع التاريخية والمختبرات افتراضياً. الذكاء الاصطناعي يخصص المحتوى حسب مستوى كل طالب.
                                - heading [level=2]: التحديات
                                - paragraph: الفجوة الرقمية بين المدن والقرى، وتأهيل المعلمين لاستخدام التقنيات الحديثة، من أبرز التحديات التي تعمل الوزارة على حلها.
