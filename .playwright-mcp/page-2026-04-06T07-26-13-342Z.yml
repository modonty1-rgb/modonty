              - paragraph [ref=e166]: التصميم من اليمين إلى اليسار يتطلب أكثر من مجرد عكس الا
              - paragraph [ref=e167]: تحديث اختباريت
              - paragraph
              - heading "نصائح خالد للمطورين" [level=2] [ref=e168]
              - heading "أولاً، ابدأ دائماً بالبحث عن المستخدم. ثانياً، اختبر مبكراً واختبر كثيراً. ثالثاً، لا تنسخ التصميم الغربي حرفياً — كيّفه للثقافة العربية. رابعاً، استثمر في الأداء لأن المستخدم العربي يتوقع سرعة عالية.جاه. يجب مراعاة ترتيب العناصر البصرية واتجاه الأيقونات وتدفق القراءة الطبيعي للمستخدم العربي. استخدم خاصية dir في HTML و logical properties في CSS مثل margin-inline-start بدلاً من margin-left." [level=2] [ref=e169]
