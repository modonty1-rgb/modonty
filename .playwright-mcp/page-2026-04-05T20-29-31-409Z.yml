                - 'heading "مقدمة: لماذا التعليم الرقمي؟" [level=2] [ref=e206]'
                - paragraph [ref=e207]: يشهد قطاع التعليم في المملكة العربية السعودية تحولاً جذرياً نحو الرقمنة، وذلك تماشياً مع رؤية 2030 التي تضع التعليم في صدارة أولوياتها. سوق التعليم الإلكتروني في المنطقة يُقدَّر بأكثر من 1.2 مليار دولار، ومن المتوقع أن ينمو بمعدل سنوي يتجاوز 15% خلال السنوات الخمس المقبلة.
                - paragraph [ref=e208]: في هذا الدليل الشامل، نستعرض أهم الفرص والتحديات التي تواجه التعليم الرقمي في السعودية، مع تقديم رؤية مستقبلية حول كيفية تطور هذا القطاع الحيوي.
                - 'heading "الفصل الأول: واقع التعليم الإلكتروني في السعودية" [level=2] [ref=e209]'
                - paragraph [ref=e210]: منذ جائحة كورونا في 2020، تسارعت وتيرة التحول الرقمي في التعليم بشكل غير مسبوق. أصبحت المنصات التعليمية الرقمية جزءاً أساسياً من المنظومة التعليمية، حيث تبنّت الحكومة السعودية منصة "مدرستي" التي خدمت أكثر من 6 ملايين طالب وطالبة.
                - heading "أبرز المنصات التعليمية السعودية" [level=3] [ref=e211]
                - list [ref=e212]:
                  - listitem [ref=e213]:
                    - paragraph [ref=e214]:
                      - strong [ref=e215]: "منصة مدرستي:"
                      - text: المنصة الرسمية للتعليم عن بُعد، تقدم محتوى تعليمي متكامل لجميع المراحل الدراسية
                  - listitem [ref=e216]:
                    - paragraph [ref=e217]:
                      - strong [ref=e218]: "منصة نون أكاديمي:"
                      - text: منصة تعليمية سعودية متخصصة في التحضير للاختبارات والتأسيس الأكاديمي
                  - listitem [ref=e219]:
                    - paragraph [ref=e220]:
                      - strong [ref=e221]: "منصة دروب:"
                      - text: منصة حكومية للتدريب المهني والتطوير الوظيفي
                  - listitem [ref=e222]:
                    - paragraph [ref=e223]:
                      - strong [ref=e224]: "منصة رواق:"
                      - text: منصة عربية رائدة في المساقات المفتوحة عبر الإنترنت
                - 'heading "الفصل الثاني: الفرص الاستثمارية في التعليم الرقمي" [level=2] [ref=e225]'
                - paragraph [ref=e226]: يُتيح قطاع التعليم الرقمي فرصاً استثمارية ضخمة للشركات ورواد الأعمال. وفقاً لتقارير السوق، فإن الطلب على المحتوى التعليمي الرقمي العربي يفوق العرض بنسبة كبيرة، مما يخلق فجوة سوقية يمكن استغلالها.
                - heading "مجالات الاستثمار الواعدة" [level=3] [ref=e227]
                - list [ref=e228]:
