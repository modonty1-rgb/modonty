                - paragraph [ref=e331]: جوجل يُحلّل كيف يتنقل الزوار في متجرك. إذا دخل زائر ثم غادر فوراً (Bounce Rate مرتفع)، فهذا يُخبر جوجل أن متجرك لم يُعجبه.
