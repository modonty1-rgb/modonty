          - generic [ref=e411]:
            - generic [ref=e412]:
              - heading "What Issues Will Our Website Audit Check For?" [level=2] [ref=e413]
              - list [ref=e414]:
                - listitem [ref=e415]:
                  - img [ref=e417]
                  - generic [ref=e420]:
                    - heading "Meta tags and snippets" [level=3] [ref=e421]
                    - generic [ref=e422]: Missing and poorly written titles and descriptions confuse search engines and lower click-through rates. We flag tags that are too short, too long, or blocked from indexing.
                - listitem [ref=e423]:
                  - img [ref=e425]
                  - generic [ref=e428]:
                    - heading "Content depth and keyword usage" [level=3] [ref=e429]
                    - generic [ref=e430]: Thin pages and copied text struggle to rank. The audit highlights low-word-count pages so you can expand or consolidate.
                - listitem [ref=e431]:
                  - img [ref=e433]
                  - generic [ref=e436]:
                    - heading "Heading and page structure" [level=3] [ref=e437]
                    - generic [ref=e438]: Out-of-order H1–H3 tags, unoptimized heading structures, and complex URLs make crawling harder. We point out heading gaps, URL issues, and canonical problems.
                - listitem [ref=e439]:
                  - img [ref=e441]
                  - generic [ref=e444]:
                    - heading "Technical setup" [level=3] [ref=e445]
                    - generic [ref=e446]: Slow server response, mixed HTTPS, and oversized HTML files hurt visibility. The report lists status-code errors and other server issues that need a fix.
                - listitem [ref=e447]:
                  - img [ref=e449]
                  - generic [ref=e452]:
                    - heading "Page speed and Core Web Vitals" [level=3] [ref=e453]
                    - generic [ref=e454]: Large images, render-blocking scripts, and heavy resources slow your site. We surface the performance issues optimize for faster load times and better user experience.
                - listitem [ref=e455]:
                  - img [ref=e457]
                  - generic [ref=e460]:
                    - heading "Mobile usability" [level=3] [ref=e461]
                    - generic [ref=e462]: Text too small, tap targets too close, or content wider than the screen push visitors away. The audit highlights mobile issues so you can meet Google’s mobile-friendly standards.
                - listitem [ref=e463]:
                  - img [ref=e465]
                  - generic [ref=e468]:
                    - heading "Indexing and crawl access" [level=3] [ref=e469]
                    - generic [ref=e470]: Robots.txt blocks, noindex tags, and orphan pages stop search engines from seeing your content. We list every barrier so you can remove it.
                - listitem [ref=e471]:
                  - img [ref=e473]
                  - generic [ref=e476]:
                    - heading "Backlink and trust signals" [level=3] [ref=e477]
                    - generic [ref=e478]: A weak or spam-heavy link profile drags down authority. The audit shows backlink gaps, nofollow distribution issues, and social share visibility so you can strengthen off-page SEO.
